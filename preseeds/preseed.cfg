#!/bin/bash
# =============================================================================
# DevPod Template - Archivo de Configuración Central
# =============================================================================
# ADAPTADO desde preseed.cfg original (Debian Born2beRoot)
# Cambios principales:
#   - Debian → Ubuntu 24.04 LTS (noble)
#   - LUKS eliminado (innecesario en VM local desarrollo)
#   - LVM simplificado (boot + root, no 7 volúmenes)
#   - Recursos definidos (RAM/CPU/disk)
#   - Puerto SSH custom (4222 en vez de 22)
#   - Usuario genérico 'dev' (en vez de 'dlesieur')
# =============================================================================

# =============================================================================
# SECCIÓN 1: LOCALIZACIÓN (heredado de preseed.cfg)
# =============================================================================

# Locale y teclado (igual que tu preseed)
LOCALE="en_US.UTF-8"
KEYBOARD_LAYOUT="es"
TIMEZONE="Europe/Madrid"

# =============================================================================
# SECCIÓN 2: CUENTAS DE USUARIO (adaptado desde preseed.cfg)
# =============================================================================

# Usuario administrativo (cambiado de 'dlesieur' a 'dev' para universalidad)
ADMIN_USER="dev"
ADMIN_FULLNAME="Developer"
ADMIN_PASSWORD="tempuser123"      # Igual que tu preseed, cámbialo después

# Root (mantenemos acceso root con password simple)
ROOT_PASSWORD="temproot123"       # Igual que tu preseed

# =============================================================================
# SECCIÓN 3: CONFIGURACIÓN TEMPLATE BASE (NUEVO - no existía en preseed)
# =============================================================================

TEMPLATE_NAME="devpod-base"
TEMPLATE_HOSTNAME="devpod-base"

# Hardware template (valores nuevos, preseed no especificaba)
TEMPLATE_RAM_MB="4096"            # 4 GB
TEMPLATE_CPU="2"                  # 2 cores
TEMPLATE_DISK_MB="51200"          # 50 GB

# Rutas (estructura similar a tu proyecto original)
BASE_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
DISK_IMAGES_DIR="${BASE_DIR}/disk_images"
TEMPLATE_DIR="${DISK_IMAGES_DIR}/${TEMPLATE_NAME}"
TEMPLATE_DISK_PATH="${TEMPLATE_DIR}/${TEMPLATE_NAME}.vdi"

# =============================================================================
# SECCIÓN 4: CONFIGURACIÓN CLONES WEB (NUEVO - tu configuración específica)
# =============================================================================

# Estos valores sobrescriben los del template cuando creas un clone web
WEB_CLONE_RAM_MB="8192"           # 8 GB (tu requerimiento)
WEB_CLONE_CPU="4"                 # 4 cores (tu requerimiento)
WEB_CLONE_DISK_MB="81920"         # 80 GB (tu requerimiento)

# Prefijos para nombrar clones (nuevo)
WEB_PREFIX="web"
MOBILE_PREFIX="mobile"
DESKTOP_PREFIX="desktop"

# =============================================================================
# SECCIÓN 5: PARTICIONADO (ADAPTADO desde preseed.cfg - SIMPLIFICADO)
# =============================================================================

# ORIGINAL preseed.cfg:
#   - Guided - use entire disk and set up encrypted LVM
#   - 7 volúmenes LVM: root, swap, home, var, srv, tmp, var-log
#   - LUKS passphrase: tempencrypt123
#   - Boot: 500MB ext2
#
# NUEVO DevPod:
#   - Sin LUKS (innecesario VM local)
#   - Sin LVM complejo (overhead administrativo)
#   - 2 particiones simples: boot + root

PARTITION_BOOT_SIZE_MB="1024"     # 1 GB (duplicado vs preseed, Ubuntu necesita más)
PARTITION_ROOT_SIZE_MB="-1"       # Resto del disco (fill remaining)

FILESYSTEM_BOOT="ext4"            # Cambiado de ext2 a ext4 (mejor rendimiento)
FILESYSTEM_ROOT="ext4"            # Mantenido

# Swap como archivo (más flexible que partición fija)
SWAP_SIZE_MB="2048"               # 2 GB swapfile (en vez de volumen LVM)

# =============================================================================
# SECCIÓN 6: RED Y SSH (ADAPTADO desde preseed.cfg)
# =============================================================================

# ORIGINAL preseed.cfg:
#   - SSH instalado pero puerto default 22
#   - netcfg/choose_interface select auto
#
# NUEVO DevPod:
#   - Puerto SSH explicitamente 4222 (evitar conflictos con host)
#   - Port forwarding NAT VirtualBox

SSH_PORT="4222"                   # Puerto host mapeado a VM
SSH_VM_PORT="22"                  # Puerto interno VM (standard)

# Port forwarding adicional (nuevo, no estaba en preseed)
HTTP_HOST_PORT="8080"             # Para servidores web de desarrollo
HTTPS_HOST_PORT="8443"            # Para HTTPS local

# Rangos para clones múltiples (nuevo)
SSH_PORT_RANGE_START="4222"
SSH_PORT_RANGE_END="4299"

# Configuración SSH hardening (simplificado vs tu b2b-setup.sh)
SSH_PERMIT_ROOT_LOGIN="no"        # No login root por SSH
SSH_PASSWORD_AUTH="no"            # Solo keys (después de setup inicial)

# =============================================================================
# SECCIÓN 7: PAQUETES (ADAPTADO desde preseed.cfg - REDUCIDO)
# =============================================================================

# ORIGINAL preseed.cfg instalaba TODO nativo:
#   nodejs, npm, golang-go, docker.io, docker-compose, podman, 
#   postgresql, redis-server, sqlite3, etc.
#
# PROBLEMA: Versiones antiguas, difícil de actualizar, contamina sistema
#
# NUEVO DevPod:
#   - Mínimo sistema + Docker
#   - Node, DBs, etc. vía Docker o nvm (versiones controladas)

# Paquetes base sistema (reducido vs preseed.cfg)
PACKAGES_BASE="
    openssh-server
    sudo
    curl
    wget
    vim
    nano
    git
    htop
    build-essential
    python3
    python3-pip
    python3-venv
    ca-certificates
    gnupg
    apt-transport-https
    software-properties-common
"

# Docker (único servicio nativo esencial)
PACKAGES_DOCKER="
    docker-ce
    docker-ce-cli
    containerd.io
    docker-compose-plugin
"

# Paquetes ELIMINADOS vs preseed.cfg (se instalarán vía Docker):
#   - nodejs, npm → Usar nvm o container node:20
#   - postgresql → container postgres:16-alpine
#   - redis-server → container redis:7-alpine
#   - golang-go → Descargar tarball oficial si necesario
#   - podman → Eliminado (Docker suficiente)
#   - wordpress, lighttpd, mariadb → Eliminados (no necesarios base)

# =============================================================================
# SECCIÓN 8: STACK WEB AUTO-INSTALABLE (NUEVO)
# =============================================================================

# Versiones específicas (controladas, no las de repos Ubuntu)
NODE_VERSION="20"                 # LTS actual
PNPM_VERSION="9"                  # Gestor paquetes rápido

# Contenedores por defecto para proyectos web
CONTAINER_POSTGRES="postgres:16-alpine"
CONTAINER_REDIS="redis:7-alpine"
CONTAINER_NGINX="nginx:alpine"    # Opcional para reverse proxy

# =============================================================================
# SECCIÓN 9: POST-INSTALACIÓN (ADAPTADO desde preseed.cfg late_command)
# =============================================================================

# ORIGINAL preseed.cfg:
#   - Copiaba b2b-setup.sh, monitoring.sh, first-boot-setup.sh
#   - Ejecutaba b2b-setup.sh en chroot
#   - Instalaba npm packages global (eslint, prettier, snyk)
#   - Instalaba pip packages (ruff, checkov, sqlfluff)
#   - Instalaba golangci-lint, helm
#   - Generaba SSH keys para dlesieur
#
# NUEVO DevPod:
#   - Scripts simplificados: setup-base.sh, setup-web.sh
#   - Sin instalaciones globales masivas (cada proyecto define sus deps)
#   - SSH keys inyectadas desde host (no generadas en VM)

# Scripts de post-instalación (nuevos, reemplazan b2b-setup.sh)
SCRIPT_SETUP_BASE="setup-base.sh"       # Configura SSH, Docker, usuario
SCRIPT_SETUP_WEB="setup-web.sh"         # Instala Node, pnpm (solo web clones)

# Directorio scripts en ISO (similar estructura a tu preseed)
ISO_SCRIPTS_DIR="scripts"

# =============================================================================
# SECCIÓN 10: VS CODE Y SSH (NUEVO - no existía en preseed)
# =============================================================================

# Optimizaciones para VS Code Remote SSH (basado en tu SSH_VSCODE_FIX.md)
VSCODE_USE_LOCAL_SERVER="false"
VSCODE_ENABLE_DYNAMIC_FORWARDING="false"
VSCODE_CONNECT_TIMEOUT="60"

# Keepalives SSH (evitar timeout NAT VirtualBox)
SSH_KEEPALIVE_INTERVAL="60"
SSH_KEEPALIVE_COUNTMAX="3"

# =============================================================================
# SECCIÓN 11: LOGGING Y UTILIDADES (NUEVO)
# =============================================================================

LOG_LEVEL="INFO"
LOGS_DIR="${BASE_DIR}/logs"
LOG_FILE="${LOGS_DIR}/devpod.log"

# Colores output
USE_COLORS="true"

# =============================================================================
# SECCIÓN 12: COMPORTAMIENTO (NUEVO)
# =============================================================================

AUTO_START_CLONE="true"
WAIT_FOR_SSH="true"
SSH_WAIT_TIMEOUT="120"

# =============================================================================
# FUNCIONES UTILIDAD (NUEVO)
# =============================================================================

# Validar carga correcta
devpod_config_loaded() { return 0; }

# Mostrar configuración
show_config() {
    echo "=== DevPod Configuration (adaptado de preseed.cfg) ==="
    echo "Distro: Ubuntu ${DISTRO_VERSION} (${DISTRO_NAME})"
    echo "Template: ${TEMPLATE_NAME} (${TEMPLATE_RAM_MB}MB RAM, ${TEMPLATE_CPU} CPUs)"
    echo "User: ${ADMIN_USER} (password: ${ADMIN_PASSWORD})"
    echo "Hostname: ${TEMPLATE_HOSTNAME}"
    echo "Disk: ${TEMPLATE_DISK_MB}MB (boot: ${PARTITION_BOOT_SIZE_MB}MB, resto root)"
    echo "SSH: puerto ${SSH_PORT} (host) → ${SSH_VM_PORT} (VM)"
    echo "Web Clone: ${WEB_CLONE_RAM_MB}MB RAM, ${WEB_CLONE_CPU} CPUs, ${WEB_CLONE_DISK_MB}MB disk"
    echo "Particionado: SIN LUKS, SIN LVM complejo (vs preseed original)"
    echo "Packages: Minimal + Docker (vs nativos en preseed)"
    echo "======================================================"
}

export -f devpod_config_loaded
export -f show_config

# =============================================================================
# FIN ARCHIVO
# =============================================================================